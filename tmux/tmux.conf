set -g prefix C-a
unbind C-b
set -sg escape-time 1
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind C-a send-prefix
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
set -g status-fg white
set -g status-bg black
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
set -g status-right "#[fg=cyan][%Y-%m-%d(%a) %H:%M]"
set -g status-interval 60
set -g status-justify centre
setw -g monitor-activity on
set -g visual-activity on
setw -g mode-keys vi
# Truecolor: tmux-256color as the inner $TERM, plus advertise the RGB
# capability to programs running inside tmux. Without this, hex fg/bg values
# from colorschemes like kanagawa get rounded to the nearest 256-color
# palette entry and the carefully-tuned colors collapse.
set-option -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",iterm2:RGB"
set-option -g default-command "$(which fish)"

# Tmux Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session save/restore plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Continuum settings (auto save/restore)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15' # Save every 15 minutes

# Clipboard integration via OSC 52.
#
# Why OSC 52: when this tmux is running on a remote host (Linux box,
# nested via ssh under a local tmux), pbcopy/xclip are useless — the
# remote box has no GUI clipboard. OSC 52 sidesteps that entirely:
# tmux emits a special escape sequence on copy, which the host tmux
# (and ultimately iTerm2) intercepts and forwards to macOS's
# clipboard. This works through any number of nested tmuxes and ssh
# sessions, as long as every layer (tmux + the terminal emulator) is
# OSC 52 aware.
#
# - set-clipboard on  -> tmux sends OSC 52 when text is copied
# - allow-passthrough on -> outer tmux forwards OSC 52 from inner tmux.
#   Only meaningful on the *outer* tmux (the one whose terminal
#   emulator can actually handle the escape). Also tmux 3.3+; older
#   versions (e.g. Ubuntu 22.04 ships 3.2a) reject it as "invalid
#   option", so guard with a version check.
# - copy-selection-and-cancel -> just copy to tmux's buffer, the
#   set-clipboard option then handles emitting OSC 52
set -g set-clipboard on

if-shell '[ "$(tmux -V | sed -E "s/[^0-9.]//g")" \> "3.2" ]' \
  'set -g allow-passthrough on'

bind-key -T copy-mode-vi y                  send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter              send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-selection-and-cancel

# Copy mode keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# lazygit popup
bind g popup -w90% -h90% -d "#{pane_current_path}" -E lazygit

# Mouse support
set -g mouse on

# Allow mouse to resize panes by dragging borders
bind -n MouseDrag1Border resize-pane -M

# Mouse scrolling support
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
